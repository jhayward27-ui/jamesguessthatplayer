<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Existential Snake: The Slab</title>
    <style>
        body { background: #1a1a1a; color: #33ff33; font-family: "Courier New", monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { position: relative; border: 4px solid #33ff33; box-shadow: 0 0 20px #33ff33; }
        canvas { display: block; background: #000; }
        #ui-overlay { position: absolute; top: 10px; left: 10px; pointer-events: none; z-index: 2; }
        #ai-narrator { width: 300px; height: 100px; background: rgba(0,0,0,0.8); border: 1px solid #33ff33; margin-top: 20px; padding: 10px; font-size: 14px; overflow-y: auto; }
        #chat-input { background: #000; border: 1px solid #33ff33; color: #33ff33; padding: 5px; width: 200px; margin-top: 10px; }
        .status { margin-bottom: 5px; }
        #shake-container { transition: transform 0.1s; }
        #start-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 10; }
        #start-card { border: 2px solid #33ff33; box-shadow: 0 0 20px #33ff33; padding: 24px; text-align: center; max-width: 420px; background: #050505; }
        #start-card h1 { margin: 0 0 12px; font-size: 26px; }
        #start-card p { margin: 0 0 18px; color: #b6ffb6; font-size: 14px; }
        #start-button { background: #000; color: #33ff33; border: 1px solid #33ff33; padding: 10px 16px; font-family: "Courier New", monospace; cursor: pointer; }
        #start-button:hover { box-shadow: 0 0 10px #33ff33; }
    </style>
</head>
<body>
    <div id="start-screen">
        <div id="start-card">
            <h1>Existential Snake</h1>
            <p>Arrow keys to steer. Grow wider. Do not become the wall.</p>
            <button id="start-button">Start Game</button>
        </div>
    </div>

    <div id="shake-container">
        <div id="ui-overlay">
            <div class="status">GIRTH: <span id="girth-val">1</span></div>
            <div class="status">STRESS: <span id="stress-val">0%</span></div>
        </div>
        <div id="game-container">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
        </div>
    </div>

    <div id="ai-narrator">AI: "Welcome, pilot. Try not to become a wall today."</div>
    <input type="text" id="chat-input" placeholder="Type a compliment here...">

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const girthDisplay = document.getElementById("girth-val");
    const stressDisplay = document.getElementById("stress-val");
    const aiBox = document.getElementById("ai-narrator");
    const chatInput = document.getElementById("chat-input");
    const shakeContainer = document.getElementById("shake-container");
    const startScreen = document.getElementById("start-screen");
    const startButton = document.getElementById("start-button");

    // Game Constants
    const gridSize = 20;
    const gridWidth = canvas.width / gridSize;
    const gridHeight = canvas.height / gridSize;
    const snakeLength = 4; // Fixed length

    let snake = [{ x: 10, y: 10 }];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let girth = 1;
    let apple = { x: 15, y: 10 };
    let speed = 150;
    let stress = 0;
    let hasStarted = false;

    const messages = [
        "Why must we eat? Is it for growth, or to fill the void?",
        "You're getting... robust. The floor boards are creaking.",
        "That apple was actually a metaphor for your greed.",
        "I'm feeling unappreciated. Talk to me.",
        "You are approaching maximum density.",
        "The walls are claustrophobic, aren't they?"
    ];

    // Input Handling
    window.addEventListener("keydown", (e) => {
        switch (e.key) {
            case "ArrowUp":
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                break;
            case "ArrowDown":
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                break;
            case "ArrowLeft":
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                break;
            case "ArrowRight":
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                break;
            default:
                break;
        }
    });

    chatInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            const val = chatInput.value.trim().toLowerCase();
            if (val.length > 5) {
                aiLog("AI: 'Flattery detected. Forward momentum continues.'");
            } else {
                aiLog("AI: 'Input acknowledged. Movement is mandatory.'");
            }
            chatInput.value = "";
        }
    });

    function aiLog(msg) {
        aiBox.innerText = msg;
        aiBox.scrollTop = aiBox.scrollHeight;
    }

    function getSegmentRect(seg) {
        const halfGirth = (girth - 1) / 2;
        const isHorizontal = direction.x !== 0;
        if (isHorizontal) {
            return {
                left: seg.x,
                right: seg.x,
                top: seg.y - halfGirth,
                bottom: seg.y + halfGirth
            };
        }
        return {
            left: seg.x - halfGirth,
            right: seg.x + halfGirth,
            top: seg.y,
            bottom: seg.y
        };
    }

    function appleOverlapsSnake(x, y) {
        for (const seg of snake) {
            const rect = getSegmentRect(seg);
            if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                return true;
            }
        }
        return false;
    }

    function spawnApple() {
        let tries = 0;
        let candidate;
        do {
            candidate = {
                x: Math.floor(Math.random() * gridWidth),
                y: Math.floor(Math.random() * gridHeight)
            };
            tries += 1;
        } while (appleOverlapsSnake(candidate.x, candidate.y) && tries < 1000);
        apple = candidate;
    }

    function update() {
        if (!hasStarted) return;

        direction = nextDirection;
        const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

        // Collision: Walls (calculated with girth)
        const halfGirth = Math.floor(girth / 2);
        const isHorizontal = direction.x !== 0;

        let top;
        let bottom;
        let left;
        let right;

        if (isHorizontal) {
            top = head.y - halfGirth;
            bottom = head.y + halfGirth;
            left = head.x;
            right = head.x;
        } else {
            top = head.y;
            bottom = head.y;
            left = head.x - halfGirth;
            right = head.x + halfGirth;
        }

        if (left < 0 || right >= gridWidth || top < 0 || bottom >= gridHeight) {
            location.reload();
            return;
        }

        snake.unshift(head);
        if (snake.length > snakeLength) snake.pop();

        // Check Apple
        if (head.x === apple.x && head.y === apple.y) {
            girth += 1;
            girthDisplay.innerText = girth;
            aiLog("AI: " + messages[Math.floor(Math.random() * messages.length)]);
            spawnApple();

        }

        draw();
        setTimeout(update, speed);
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Apple
        ctx.fillStyle = "#ff3333";
        ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize, gridSize);

        // Draw Cursed Wide Snake
        ctx.fillStyle = "#33ff33";
        const halfGirth = (girth - 1) / 2;
        const isHorizontal = direction.x !== 0;

        for (const seg of snake) {
            let drawX;
            let drawY;
            let drawW;
            let drawH;

            if (isHorizontal) {
                drawX = seg.x * gridSize;
                drawY = (seg.y - halfGirth) * gridSize;
                drawW = gridSize;
                drawH = girth * gridSize;
            } else {
                drawX = (seg.x - halfGirth) * gridSize;
                drawY = seg.y * gridSize;
                drawW = girth * gridSize;
                drawH = gridSize;
            }

            ctx.fillRect(drawX, drawY, drawW, drawH);
        }

        // Wall stress effect
        if (girth > 5) {
            shakeContainer.style.transform = "translate(" + (Math.random() * 2).toFixed(1) + "px, " + (Math.random() * 2).toFixed(1) + "px)";
        } else {
            shakeContainer.style.transform = "translate(0px, 0px)";
        }

        stress = Math.min(100, girth * 5);
        stressDisplay.innerText = stress + "%";
    }

    function startGame() {
        if (hasStarted) return;
        hasStarted = true;
        startScreen.style.display = "none";
        aiLog('AI: "Welcome, pilot. Try not to become a wall today."');
        spawnApple();
        draw();
        update();
    }

    startButton.addEventListener("click", startGame);
</script>
</body>
</html>
