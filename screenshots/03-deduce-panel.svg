<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0b1223"/>
  <rect x="0" y="0" width="1280" height="720" fill="#000000" opacity="0.45"/>
  <rect x="290" y="150" width="700" height="420" rx="16" fill="#1a2445" stroke="#334b84"/>
  <text x="640" y="220" fill="#e8eefc" font-family="Arial, sans-serif" font-size="38" text-anchor="middle">Deduce Mode</text>
  <text x="640" y="290" fill="#b8c7e7" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">Is the sport played on ice? (NHL)</text>
  <text x="640" y="330" fill="#91a5d3" font-family="Arial, sans-serif" font-size="20" text-anchor="middle">(18 possible players)</text>
